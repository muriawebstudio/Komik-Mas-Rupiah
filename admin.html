<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin KomikHub</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1e272e; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #2f3640; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2, h3 { margin-top: 0; color: #ff4757; }
    .stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-box { flex: 1; background: #3d3d3d; padding: 15px; border-radius: 6px; text-align: center; }
    .stat-box h2 { font-size: 2rem; margin: 5px 0; color: #0984e3; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #485460; background: #1e272e; color: #fff; box-sizing: border-box; }
    .btn { background: #ff4757; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard Admin 🛠️</h1>
    
    <!-- Statistik Dashboard -->
    <div class="card">
      <h3>Statistik Konten</h3>
      <div class="stats">
        <div class="stat-box">
          <span>Total Episode</span>
          <h2 id="stat-total">...</h2>
        </div>
        <div class="stat-box">
          <span>Episode Terbaru</span>
          <h2 id="stat-latest" style="font-size: 1.2rem; padding-top:10px;">...</h2>
        </div>
      </div>
    </div>

    <!-- Form Tambah Episode -->
    <div class="card">
      <h3>➕ Tambah Episode Baru</h3>
      <form id="form-episode">
        <label>Judul Episode</label>
        <input type="text" id="judul" placeholder="Contoh: Pertemuan Pertama" required>

        <label>Nomor Episode</label>
        <input type="number" id="episode" placeholder="Contoh: 15" required>

        <label>Link Cover Gambar (URL)</label>
        <input type="url" id="cover" placeholder="https://..." required>

        <label>Link Google Drive PDF (Preview)</label>
        <input type="url" id="drive" placeholder="https://drive.google.com/file/d/.../preview" required>

        <label>Deskripsi Singkat</label>
        <textarea id="deskripsi" rows="3" placeholder="Ceritakan sedikit tentang episode ini..."></textarea>

        <label>Status</label>
        <select id="status">
          <option value="publish">Publish</option>
          <option value="draft">Draft</option>
        </select>

        <button type="submit" class="btn">🚀 Simpan Ke Spreadsheet</button>
      </form>
    </div>
  </div>

  <script>
    // GANTI DENGAN URL APPS SCRIPT ANDA
    const API_URL = "https://script.google.com/macros/s/AKfycbxsS4svr2fx2LzamOpih1f8ZatcdlAsSYdt2VmSlfjf6UJqdsIM9jqKCvLta9V-wwQEIA/exec"; 

    // Ambil data untuk statistik dashboard
    async function loadStats() {
      const res = await fetch(`${API_URL}?action=getData`);
      const data = await res.json();
      const totalEp = data.komik.length;
      document.getElementById('stat-total').innerText = totalEp;
      if(totalEp > 0) {
        document.getElementById('stat-latest').innerText = `Ep ${data.komik[totalEp-1].episode}: ${data.komik[totalEp-1].judul}`;
      } else {
        document.getElementById('stat-latest').innerText = "-";
      }
    }

    // Handle Submit Form Tambah Episode (Kirim POST ke Apps Script)
    document.getElementById('form-episode').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerText = "⏳ Sedang Menyimpan...";
      btn.disabled = true;

      const payload = {
        action: "addEpisode",
        judul: document.getElementById('judul').value,
        episode: document.getElementById('episode').value,
        cover: document.getElementById('cover').value,
        drive: document.getElementById('drive').value,
        deskripsi: document.getElementById('deskripsi').value,
        tanggal: new Date().toISOString().split('T')[0], // Tanggal otomatis hari ini
        status: document.getElementById('status').value
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if(result.status === 'success') {
          alert("Mantap! Episode berhasil masuk Spreadsheet.");
          document.getElementById('form-episode').reset();
          loadStats();
        } else {
          alert("Gagal menyimpan: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi ke backend.");
      } finally {
        btn.innerText = "🚀 Simpan Ke Spreadsheet";
        btn.disabled = false;
      }
    });

    window.onload = loadStats;
  </script>
</body>
</html>
